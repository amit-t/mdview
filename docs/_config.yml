title: mdview
description: Preview any markdown file in your browser (or terminal) with one command.
url: https://amit-t.github.io
baseurl: /mdview
repository: amit-t/mdview

github:
  owner_name: amit-t
  owner_url: https://github.com/amit-t
  repository_name: mdview
  repository_url: https://github.com/amit-t/mdview
  zip_url: https://github.com/amit-t/mdview/zipball/main
  tar_url: https://github.com/amit-t/mdview/tarball/main

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false
